  <h2>11.1 ¿Por qué DUA en la programación?</h2>
  <p>La programación se presenta históricamente como una actividad para "los que tienen cabeza para ello". El DUA desmonta esta idea: cualquier persona puede aprender a programar si se le ofrece el acceso correcto.</p>

  ${table(

  <h2>11.3 Pair Programming y roles cooperativos</h2>
  <p>El pair programming (programación en parejas) es una práctica de la industria del software especialmente eficaz en el aula por sus beneficios DUA:</p>
  <ul>
    <li><strong>Conductor/a:</strong> escribe el código.</li>
    <li><strong>Navegante/a:</strong> lee el código, detecta errores, piensa en los próximos pasos.</li>
    <li>Rotación cada 15 minutos: ambos pasan por los dos roles.</li>
  </ul>
