<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Variables e Tipos de Datos — MicroPython na Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">📦 Capitulo 02</div>
      <h1>Variables e Tipos de Datos</h1>
      <p class="subtitle">Variables, tipos basicos, operacins matematicas e o sensor de temperatura.</p>
      <div class="header-badges"><span class="badge badge-green">${level(1)}</span><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap2');
document.getElementById('mc').innerHTML=`

  <h2>2.1 Que e unha variable?</h2>
  <p>Unha variable e como unha <strong>caixa etiquetada</strong> onde gardamos informacion.</p>
  ${conceptBox(["nome = 'Ana'    → caixa 'nome' coa texto 'Ana'", "idade = 10      → caixa 'idade' co numero 10", 'temp = 36.5     → caixa con decimal', 'on = True       → caixa: so True ou False'])}
  ${duaBox('rep',['<strong>Metafora fisica:</strong> caixas de carton na clase con etiquetas. Cambiar o valor = cambiar o contido.', "<strong>Analoxia 6-9 anos:</strong> 'unha variable e como a taquilla da aula: ten o teu nome e gardas o que queres.'"])}
  <h2>2.2 Tipos de datos</h2>
  ${table(['Tipo', 'Exemplo'],[['int', '0, 5, -3, 100'], ['float', '3.14, -0.5'], ['str', "'Ola', 'micro:bit'"], ['bool', 'True / False']])}
  ${codeBlock('variables.py',['from microbit import *', '', "name    = 'micro:bit'   # str: text", 'version = 2             # int: integer', 'voltage = 3.3           # float: decimal', 'active  = True          # bool: True/False', '', 'display.scroll(name)', 'sleep(500)', 'display.scroll(str(version))'])}
  ${warnBox(['Para mostrar un numero nos LEDs, convirteo con str().', 'display.scroll(5) da erro. Correcto: display.scroll(str(5)).'])}
  <h2>2.3 Operacins</h2>
  ${codeBlock('ops.py',['from microbit import *', '', 'a = 10', 'b = 3', '', 'add  = a + b    # 13', 'sub  = a - b    # 7', 'mul  = a * b    # 30', 'div  = a / b    # 3.33...', 'idiv = a // b   # 3  (integer division)', 'mod  = a % b    # 1  (remainder)', 'pw   = a ** b   # 1000 (power)', '', "display.scroll('sum=' + str(add))"])}
  <h3>✏️ Exercicio 2.1 — Calculadora ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Define num1 e num2. Calcula suma, resta, produto e division. Mostra cada resultado con prefixo (+, -, x, /).</p>
  </div></div>
  ${duaBox('ace',["<strong>Modelo:</strong> num1 = ___ / num2 = ___ / suma = ___ + ___ / display.scroll('+' + str(suma))", '<strong>Extension:</strong> redondea a division a 1 decimal con round(resultado, 1).'])}
  ${duaBox('imp',['<strong>Contexto real:</strong> usa datos do alumno: numero de zapato e idade, temperatura de hoxe e de onte.'])}
  <h2>2.4 Sensor de temperatura</h2>
  ${codeBlock('temp.py',['from microbit import *', '', 'while True:', '    temp = temperature()', "    display.scroll(str(temp) + 'C')", '    sleep(2000)'])}
  ${noteBox(['temperature() devolve a temperatura do chip, 2-5 graus maior que a do ambiente.', 'Para ambiente: temp = temperature() - 3'])}
`;
</script>
</body>
</html>
