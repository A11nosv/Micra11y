<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bucles — MicroPython na Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🔄 Capitulo 04</div>
      <h1>Bucles</h1>
      <p class="subtitle">Bucles while e for, animacins LED e patrons con pixels.</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap4');
document.getElementById('mc').innerHTML=`

  <h2>4.1 O bucle while</h2>
  ${duaBox('rep',['<strong>Actividade fisica:</strong> 5 alumnos en fila din o seu nome MENTRES quedan persoas diante. Actuaron un bucle while.', '<strong>Analoxia:</strong> o bucle e como o tambor dunha lavadora: xira ata que remata.'])}
  ${codeBlock('while_loop.py',['from microbit import *', '', 'n = 5', 'while n > 0:', '    display.show(str(n))', '    sleep(800)', '    n -= 1   # n = n - 1', '', 'display.show(Image.HAPPY)'])}
  ${conceptBox(['O bucle while repite mentres a condicion sexa True.', 'n -= 1 e abreviatura de n = n - 1.'])}
  <h2>4.2 O bucle for</h2>
  ${codeBlock('for_loop.py',['from microbit import *', '', '# range(5) → 0,1,2,3,4', 'for i in range(5):', '    display.show(str(i))', '    sleep(500)', '', '# range(1,6) → 1,2,3,4,5', 'for i in range(1, 6):', '    display.show(str(i))', '    sleep(400)'])}
  ${noteBox(['range(n) xera 0, 1, 2, ..., n-1.', 'range(inicio, fin, paso) permite contar de 2 en 2, de 3 en 3, ou cara atras.'])}
  <h2>4.3 Bucles anidados — Animacion</h2>
  ${codeBlock('nested.py',['from microbit import *', '', 'for y in range(5):', '    for x in range(5):', '        display.set_pixel(x, y, 9)', '        sleep(50)', 'sleep(500)', 'display.clear()'])}
  <h3>✏️ Exercicio 4.1 — Contador dixital ${level(1)} ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Conta 0, 1, 2... ata 9 e volve empezar. Cada numero 0,5 s. Extension: boton A para.</p>
  </div></div>
  ${duaBox('ace',['<strong>Nivel 1 — Modelo:</strong> for i in range(___): display.show(str(___)) sleep(___)', '<strong>Nivel 3 — Avanzado:</strong> conta atras 9→0 con range(9, -1, -1).'])}
  ${duaBox('imp',['<strong>Eleccion de contexto:</strong> o alumno pode programar un temporizador de partido, contador de exercicios...'])}
  <h3>✏️ Exercicio 4.2 — Pixels e patrons ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Con display.set_pixel(x, y, brillo) e bucles anidados: 1. Debuxa o bordo (5×5). 2. Unha X (2 diagonais). 3. Taboleiro de xadrez: acendido se (x+y)%2==0.</p>
  </div></div>
`;
</script>
</body>
</html>
