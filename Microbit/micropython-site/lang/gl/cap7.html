<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Son e Musica — MicroPython na Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🎵 Capitulo 07</div>
      <h1>Son e Musica</h1>
      <p class="subtitle">Melodias predefinidas, composicion con notas e frecuencias en Hz.</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap7');
document.getElementById('mc').innerHTML=`

  ${duaBox('rep',['<strong>Accesibilidade auditiva:</strong> para alumnos con hipoacusia, substitue music.play() por display.show(). O capitulo e completamente accesible en modo visual.', 'Os alumnos con sensibilidade auditiva poden traballar con auricularees ou con volume baixo.'])}
  <h2>7.1 Melodias predefinidas</h2>
  ${codeBlock('melodies.py',['from microbit import *', 'import music', '', 'music.play(music.BIRTHDAY)', 'sleep(500)', 'music.play(music.POWER_UP)', 'sleep(500)'])}
  ${table(['Melodia', 'Descripcion'],[['music.BIRTHDAY', 'Feliz aniversario'], ['music.POWER_UP', 'Inicio/Victoria'], ['music.POWER_DOWN', 'Derrota'], ['music.FUNERAL', 'Marcha funbre'], ['music.BA_DING', 'Notificacion']])}
  <h2>7.2 Composicion con notas</h2>
  ${codeBlock('scale.py',['from microbit import *', 'import music', '', "# Format: 'NOTE OCTAVE : DURATION'", '# Notes: C D E F G A B', '# Duration: 4=quarter 8=eighth 2=half 1=whole', '', "scale = ['C4:4','D4:4','E4:4','F4:4',", "         'G4:4','A4:4','B4:4','C5:4']", 'music.play(scale)'])}
  ${noteBox(['Escala en Hz: C=262, D=294, E=330, F=349, G=392, A=440, B=494.', 'Duplicar a frecuencia = subir unha octava.'])}
  <h3>✏️ Exercicio 7.1 — Compositor ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Compón unha melodia propia de polo menos 8 notas con 2 duracins diferentes. Dalle un nome e documentaa con comentarios.</p>
  </div></div>
  ${duaBox('ace',['<strong>Opcion visual:</strong> escribe as notas nunha partitura ou taboa (Do-Re-Mi...) e logo transcribe ao codigo.', '<strong>Opcion oral:</strong> taralea a melodia mentres a micro:bit a reproduce.', '<strong>Opcion libre:</strong> transcribe ao codigo unha melodia existente que xa connezas.'])}
  ${duaBox('imp',['<strong>Eleccion total:</strong> o alumno elixe que melodia compón. Sen restriccins de estilo. Rap, clasica, pop, inventada...'])}
`;
</script>
</body>
</html>
