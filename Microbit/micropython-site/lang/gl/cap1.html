<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preparando o Contorno de Traballo — MicroPython na Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🖥️ Capitulo 01</div>
      <h1>Preparando o Contorno de Traballo</h1>
      <p class="subtitle">Material necesario, o editor en liña e os primeiros programas.</p>
      <div class="header-badges"><span class="badge badge-green">${level(1)}</span><span class="badge badge-amber">${level(2)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap1');
document.getElementById('mc').innerHTML=`

  <h2>1.1 Material necesario</h2>
  <ul>
    <li><strong>micro:bit v1 ou v2</strong> — a v2 ten microfono e altofalar integrados.</li>
    <li><strong>Cable USB</strong> micro-USB a USB-A estandar.</li>
    <li><strong>Ordenador ou tableta</strong> con navegador moderno (Chrome recomendado).</li>
    <li><strong>Editor en lina</strong> <a href='https://python.microbit.org' target='_blank'>python.microbit.org</a> — gratuito, sen instalacion.</li>
  </ul>
  ${noteBox(['A micro:bit v2 é recomendable para 5.º de Primaria en adiante.', 'Un xogo de 6-8 micro:bits en rotacion é suficiente para 30 alumnos.', 'O editor funciona tamén en tabletas con teclado Bluetooth.'])}
  ${duaBox('rep',['<strong>Metafora:</strong> o programa e como unha receita: primeiro dis os ingredientes (import), logo os pasos (display.scroll).', "<strong>Multimodal:</strong> fai que os alumnos 'actuen' o programa antes de escribilo.", '<strong>Glosario visual:</strong> cartel na aula cos termos novos: import, display, scroll.'])}
  <h2>1.2 O Editor en Liña</h2>
  <p>Visita <a href="https://python.microbit.org" target="_blank">python.microbit.org</a> dende calquera navegador. Sen conta nin instalacion.</p>
  ${table(['Zona do editor', 'Función', 'Para que'],[['Panel esquerdo', 'Codigo Python', 'Escribir programas'], ['Simulador central', 'Vista previa', 'Probar sen placa'], ['Consola inferior', 'Erros e print()', 'Depurar'], ['Boton Flash', 'Envia a placa', 'Cargar programa'], ['Referencia API', 'Documentacion', 'Consultar']])}
  <h2>1.3 O teu primeiro programa</h2>
  <p>Escribe o codigo no editor e prime <strong>Flash</strong>:</p>
  ${codeBlock('hola_full.py',['# First MicroPython program', '# # marks a comment: Python ignores it', '', 'from microbit import *', '', "display.scroll('Hello world!')"])}
  ${table(['Lina de codigo', 'Que fai?'],[['# Primeiro programa...', 'Comentario: Python ignórao.'], ['from microbit import *', 'Importa todas as funcions. SEMPRE primeira lina.'], ["display.scroll('Ola mundo!')", 'Despraza o texto polos LEDs.']])}
  ${duaBox('rep',['<strong>Metafora:</strong> o programa e como unha receita: primeiro dis os ingredientes (import), logo os pasos (display.scroll).', "<strong>Multimodal:</strong> fai que os alumnos 'actuen' o programa antes de escribilo.", '<strong>Glosario visual:</strong> cartel na aula cos termos novos: import, display, scroll.'])}
  <h3>✏️ Exercicio 1.1 — Presentacion persoal ${level(1)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Modifica o programa para que a micro:bit mostre <strong>o teu nome</strong>.</p><p>Despois, fai que mostre tamén a tua idade.</p><p><em>Extension:</em> podes engadir Image.HEART?</p>
  </div></div>
  ${duaBox('ace',['<strong>Opcion A:</strong> escribe o codigo modificando o exemplo.', "<strong>Opcion B (modelo):</strong> <code>display.scroll('____')</code>", '<strong>Opcion C (verbal):</strong> dicta a un companeiro/a que escribe.', '<strong>Opcion D (extension):</strong> busca Image.HEART e outras imaxes.'])}
  ${duaBox('imp',['<strong>Eleccion:</strong> cada alumno elixe que mostrar: nome, alcume, emoji favorito.', '<strong>Logro visible:</strong> ver o nome propio nos LEDs e o primeiro bucle causa-efecto.'])}
  <h2>1.4 Imaxes predefinidas</h2>
  ${codeBlock('images.py',['from microbit import *', '', 'display.show(Image.HAPPY)    # Happy face', 'sleep(1000)                  # Wait 1 second', 'display.show(Image.SAD)      # Sad face', 'sleep(1000)', 'display.show(Image.HEART)    # Heart'])}
  ${noteBox(['sleep() recibe milisegundos: 1000 = 1 segundo.', 'Banco de imaxes: Image.HAPPY, Image.SAD, Image.SURPRISED, Image.HEART, Image.ARROW_N...'])}
  <h3>✏️ Exercicio 1.2 — Historia emocional ${level(1)} ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Crea unha secuencia de polo menos <strong>5 imaxes</strong> que conten unha historia.</p><p>Usa sleep() para que cada imaxe dure un tempo diferente.</p><p>Exemplo: HAPPY → HEART → SAD → NO → HAPPY</p>
  </div></div>
`;
</script>
</body>
</html>
