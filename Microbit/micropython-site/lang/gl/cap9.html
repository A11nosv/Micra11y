<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proxectos Completos con Adaptacins DUA — MicroPython na Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🚀 Capitulo 09</div>
      <h1>Proxectos Completos con Adaptacins DUA</h1>
      <p class="subtitle">Catro proxectos con tres niveis DUA. Todo o grupo traballa o mesmo proxecto.</p>
      <div class="header-badges"><span class="badge badge-green">${level(1)}</span><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span><span class="badge badge-blue">${level(4)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap9');
document.getElementById('mc').innerHTML=`

  ${noteBox(['Principio DUA: todos os alumnos traballan o MESMO proxecto, con diferente nivel de apoio. Isto evita a estigmatizacion.', 'O nivel non e fixo: un alumno pode empezar no Nivel 1 e avanzar ao Nivel 2 ou 3 durante a sesion.'])}
  <h2>Proxecto 1 — O meu Robot Emocional ${level(1)}</h2>
  ${codeBlock('robot.py',['from microbit import *', '', 'display.show(Image.HAPPY)', '', 'while True:', "    if accelerometer.current_gesture() == 'shake':", '        display.show(Image.SURPRISED)', '        sleep(1000)', '        display.show(Image.HAPPY)', '    if button_a.is_pressed():', '        display.show(Image.SAD)', '        sleep(800)', '        display.show(Image.HAPPY)', '    if button_b.is_pressed():', '        display.show(Image.ASLEEP)', '        sleep(2000)', '        display.show(Image.HAPPY)', '    sleep(100)'])}
  ${duaBox('ace',['<strong>Nivel 1 — Modelo:</strong> codigo xa escrito, o alumno so cambia imaxes e tempos.', '<strong>Nivel 2 — Estandar:</strong> codigo guiado do exemplo.', '<strong>Nivel 3 — Extension libre:</strong> engade sons, temperatura e emocins propias.'])}
  ${duaBox('imp',["<strong>Motivacion intrinseca:</strong> o robot ten o nome e personalidade que o alumno elixiu. Non e 'o robot do exercicio', e 'o seu robot'."])}
  <h2>Proxecto 2 — Podometro ${level(2)}</h2>
  ${codeBlock('pedo.py',['from microbit import *', '', 'steps  = 0', 'last_z = accelerometer.get_z()', 'thresh = 400', '', 'while True:', '    z    = accelerometer.get_z()', '    diff = abs(z - last_z)', '    if diff > thresh:', '        steps += 1', '        display.show(str(steps % 10))', '    last_z = z', '    if button_a.was_pressed():', '        display.scroll(str(steps))', '    if button_b.was_pressed():', '        steps = 0', '    sleep(50)'])}
  ${duaBox('imp',['<strong>Fora da aula:</strong> leva a sesion ao patio. Os alumnos proban o podometro camiando, correndo, subindo escaleiras e comparan resultados.'])}
  <h2>Proxecto 3 — Estacion Meteoroloxica ${level(3)}</h2>
  ${codeBlock('weather.py',['from microbit import *', '', 'readings = []', '', 'def cal_temp():', '    return temperature() - 3', '', 'def mean(lst):', '    return sum(lst)/len(lst) if lst else 0', '', 'def record():', '    t = cal_temp()', '    readings.append(t)', '    if len(readings) > 10:', '        readings.pop(0)', '    return t', '', 'while True:', '    t = record()', "    display.scroll(str(t) + 'C', delay=70)", '    if button_a.was_pressed():', '        display.scroll(str(round(mean(readings),1)))', '    sleep(5000)'])}
  <h2>Proxecto 4 — Sistema de Control de Acceso ${level(4)}</h2>
  ${codeBlock('lock.py',['from microbit import *', 'import radio', '', 'radio.on()', 'radio.config(group=42)', '', "PASSWORD = '2024micro'", 'attempts = 0', 'locked   = False', '', 'def open_door():', '    display.show(Image.YES)', '    sleep(2000)', '    display.clear()', '', 'def lock_out():', '    global locked', '    locked = True', "    display.scroll('LOCKED')", '', 'while True:', '    msg = radio.receive()', '    if msg and not locked:', '        if msg == PASSWORD:', '            attempts = 0', '            open_door()', '        else:', '            attempts += 1', '            if attempts >= 3:', '                lock_out()', '    sleep(100)'])}
  ${duaBox('imp',['<strong>Debate etico:</strong> que datos debe almacenar un sistema de acceso? Canto tempo? Quen os pode ver? Conecta co RXPD.', '<strong>Comparacion co real:</strong> tarxeta do metro, huella dactilar, reconecemento facial. Cal e mais seguro? Cal respecta mais a privacidade?'])}
`;
</script>
</body>
</html>
