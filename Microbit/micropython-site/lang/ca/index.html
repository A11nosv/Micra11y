<script>
initPage('index');
document.getElementById('mc').innerHTML=`

    <h1 style="font-family:var(--font-display);font-size:clamp(36px,5vw,60px);font-weight:900;line-height:1.05;letter-spacing:-1px;margin-bottom:14px">MicroPython<br><em>a l'Aula</em></h1>
    <p style="font-size:17px;color:#94a3b8;max-width:560px;line-height:1.65;margin-bottom:24px">Guia pràctica amb micro:bit per a docents de Primària i Secundària. Dissenyada amb el marc del <strong style='color:#fff'>Disseny Universal per a l'Aprenentatge (DUA)</strong> perquè tots els alumnes, de 6 a 16 anys, puguin participar.</p>

    <li>Cada exercici té <strong>caixes DUA desplegables</strong> (🟥🟦🟩) amb adaptacions concretes.</li>
    <li>Els exercicis estan marcats per nivell: <span class='level-badge level-1'>🟢 Iniciació</span> <span class='level-badge level-2'>🟡 Bàsic</span> <span class='level-badge level-3'>🟠 Intermedi</span> <span class='level-badge level-4'>🔴 Avançat</span></li>
  </ul>
  <script>
  const descs={'dua': 'Els 3 principis DUA i com llegir les marques en aquest manual.', 'cap1': 'Editor en línia, primer programa i imatges als LEDs.', 'cap2': 'Variables, tipus de dades i el sensor de temperatura.', 'cap3': 'Condicionals if/elif/else, botons A i B.', 'cap4': 'Bucles while i for, animacions LED.', 'cap5': 'Llistes i funcions reutilitzables.', 'cap6': 'Acceleròmetre, gestos, sensors de llum i temperatura.', 'cap7': 'Melodies, composició amb notes, veu i freqüències.', 'cap8': 'Comunicació ràdio entre micro:bits.', 'cap9': 'Quatre projectes amb tres nivells DUA.', 'cap10': "Estratègies DUA, avaluació i gestió de l'aula.", 'cap11': 'Creació de productes finals accessibles: interfícies físiques adaptades, sortides multimodals i codi inclusiu.', 'apendice': 'Referència ràpida, errors freqüents i glossari.'};

`;
