<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bucles — MicroPython a l'Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🔄 Capítol 04</div>
      <h1>Bucles</h1>
      <p class="subtitle">Bucles while i for, animacions LED i patrons amb píxels.</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap4');
document.getElementById('mc').innerHTML=`

  <h2>4.1 El bucle while</h2>
  ${duaBox('rep',['<strong>Activitat física:</strong> 5 alumnes en fila diuen el seu nom MENTRE quedin persones al davant. Han actuat un bucle while.', "<strong>Analogia:</strong> el bucle és com el tambor d'una rentadora: gira fins que acaba."])}
  ${codeBlock('while_loop.py',['from microbit import *', '', 'n = 5', 'while n > 0:', '    display.show(str(n))', '    sleep(800)', '    n -= 1   # n = n - 1', '', 'display.show(Image.HAPPY)'])}
  ${conceptBox(['El bucle while repeteix mentre la condició sigui True.', 'n -= 1 és una abreviatura de n = n - 1.'])}
  <h2>4.2 El bucle for</h2>
  ${codeBlock('for_loop.py',['from microbit import *', '', '# range(5) → 0,1,2,3,4', 'for i in range(5):', '    display.show(str(i))', '    sleep(500)', '', '# range(1,6) → 1,2,3,4,5', 'for i in range(1, 6):', '    display.show(str(i))', '    sleep(400)'])}
  ${noteBox(['range(n) genera 0, 1, 2, ..., n-1.', 'range(inici, fi, pas) permet comptar de 2 en 2, de 3 en 3, o cap enrere.'])}
  <h2>4.3 Bucles aniuats — Animació</h2>
  ${codeBlock('nested.py',['from microbit import *', '', 'for y in range(5):', '    for x in range(5):', '        display.set_pixel(x, y, 9)', '        sleep(50)', 'sleep(500)', 'display.clear()'])}
  <h3>✏️ Exercici 4.1 — Comptador digital ${level(1)} ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Compte 0, 1, 2... fins a 9 i torna a iniciar. Cada número 0,5 s. Extensió: botó A pausa.</p>
  </div></div>
  ${duaBox('ace',['<strong>Nivell 1 — Plantilla:</strong> for i in range(___): display.show(str(___)) sleep(___)', '<strong>Nivell 3 — Avançat:</strong> compte enrere 9→0 amb range(9, -1, -1).'])}
  ${duaBox('imp',["<strong>Elecció de context:</strong> l'alumne pot programar un temporitzador de partit, comptador d'exercicis..."])}
  <h3>✏️ Exercici 4.2 — Píxels i patrons ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Amb display.set_pixel(x, y, brillantor) i bucles aniuats: 1. Dibuixa el vora (5×5). 2. Una X (2 diagonals). 3. Tauler d'escacs: encès si (x+y)%2==0.</p>
  </div></div>
`;
</script>
</body>
</html>
