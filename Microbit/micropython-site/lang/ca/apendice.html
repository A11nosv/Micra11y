<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Referència Ràpida de MicroPython — MicroPython a l'Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">📋 Apèndix</div>
      <h1>Referència Ràpida de MicroPython</h1>
      <p class="subtitle">Funcions clau, errors freqüents i glossari DUA per tenir a mà a l'aula.</p>
      <div class="header-badges"><span class="badge badge-blue">📋</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('apendice');
document.getElementById('mc').innerHTML=`

  <h2>A.1 Pantalla LED</h2>
  ${codeBlock('ref_screen.py',['from microbit import *', 'display.show(Image.HAPPY)         # Show image', "display.scroll('text')            # Scroll text", 'display.clear()                   # Turn off all LEDs', 'display.set_pixel(x, y, b)        # Set pixel (b = 0-9)', 'display.read_light_level()        # Light sensor (0-255)'])}
  <h2>A.2 Botons i Sensors</h2>
  ${codeBlock('ref_input.py',['button_a.is_pressed()   # True if pressed now', 'button_a.was_pressed()  # True since last check', 'accelerometer.get_x()  # X axis (-2000 to +2000)', 'accelerometer.current_gesture()  # shake/up/down/left/right', 'temperature()           # Chip temperature in Celsius'])}
  <h2>A.3 Temps i Atzar</h2>
  ${codeBlock('ref_time.py',['sleep(ms)              # Pause (1000 = 1 second)', 'import random', 'random.randint(a, b)   # Random integer [a, b]', 'random.choice(lst)     # Random element from list'])}
  <h2>A.4 Música</h2>
  ${codeBlock('ref_music.py',['import music', 'music.play(music.BIRTHDAY)', "music.play(['C4:4', 'D4:4'])   # Note list", 'music.pitch(freq, dur)         # Hz, milliseconds', '# Notes: C D E F G A B'])}
  <h2>A.5 Ràdio</h2>
  ${codeBlock('ref_radio.py',['import radio', 'radio.on()             # Always first!', 'radio.config(group=N)  # Channel 1-255', "radio.send('msg')      # Send text", 'radio.receive()        # Receive text (None if empty)'])}
  <h2>A.6 Errors freqüents</h2>
  ${table(['Error', 'Causa', 'Solució'],[['SyntaxError', "Falta ':' o cometes sense tancar.", 'Revisa la línia indicada.'], ['IndentationError', "Barreja d'espais i tabuladors.", 'Re-indenta amb 4 espais.'], ['TypeError', 'Concatenar número i text directament.', "str(number) + 'text'"], ['NameError', 'Variable usada abans de definir-se.', "Defineix la variable amb '=' primer."]])}
  <h2>A.7 Glossari DUA</h2>
  ${table(['Terme', 'Definició', 'Metàfora'],[['variable', 'Espai per guardar un valor.', 'Caixa etiquetada.'], ['if / else', 'Executa codi segons condició.', 'Semàfor.'], ['while / for', 'Repeteix un bloc de codi.', 'Rentadora.'], ['def', 'Defineix funció reutilitzable.', 'Recepta amb nom.'], ['sleep()', "Pausa l'execució.", 'El programa fa una becaina.'], ['True / False', 'Dos únics valors booleans.', 'Interruptor on/off.']])}
  <div style="text-align:center;margin-top:48px;padding-top:24px;border-top:2px solid var(--paper2)">
    <p style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--blue);font-style:italic;margin-bottom:8px">
      Bona sort programant amb els teus alumnes!
    </p>
    <p style="color:var(--ink2);font-style:italic">
      Dissenyar per a la diversitat no és dissenyar per a uns pocs. És dissenyar millor per a tothom.
    </p>
  </div>
`;
</script>
</body>
</html>
