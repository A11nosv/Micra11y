<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cap. 7: So i Música — MicroPython a l'Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">☰</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🎵 Capítol 07</div>
      <h1>So i Música</h1>
      <p class="subtitle">Melodies predefinides, composició amb notes, síntesi de veu i sons amb freqüències en Hz.</p>
      <div class="header-badges">
        <span class="badge badge-amber">🟡 Bàsic</span>
        <span class="badge badge-coral">🟠 Intermedi</span>
      </div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap7');
const contentHTML = `
  ${duaBox('rep', [
    '<strong>Accessibilitat auditiva:</strong> per a alumnes amb hipoacúsia o sordesa, tots els exercicis es poden completar substituint music.play() per display.show() o display.scroll(). La nota es mostra com a text ("Do", "Re"...) o com a número de freqüència.',
    'Els alumnes amb sensibilitat auditiva poden treballar amb auriculars o amb el volum baix.',
    'El capítol és completament accessible en mode només visual.'
  ])}

  <h2>7.1 Melodies predefinides</h2>
  ${codeBlock('melodies.py', [
    'from microbit import *',
    'import music',
    '',
    'music.play(music.BIRTHDAY)    # Aniversari feliç',
    'sleep(500)',
    'music.play(music.POWER_UP)    # So d\'inici',
    'sleep(500)',
    'music.play(music.FUNERAL)     # Marxa fúnebre'
  ])}

  ${table(
    ['Melodia', 'Descripció'],
    [
      ['music.BIRTHDAY', 'Aniversari feliç'],
      ['music.WEDDING', 'Marxa nupcial'],
      ['music.FUNERAL', 'Marxa fúnebre'],
      ['music.POWER_UP', 'So d\'inici / victòria'],
      ['music.POWER_DOWN', 'So d\'apagat / derrota'],
      ['music.JUMP_UP / JUMP_DOWN', 'Efectes de salt'],
      ['music.BA_DING', 'Notificació curta']
    ]
  )}

  <h2>7.2 Composició amb notes</h2>
  ${codeBlock('escala.py', [
    'from microbit import *',
    'import music',
    '',
    "# Format de nota: 'NOTA OCTAVA : DURADA'",
    '# Notes: C D E F G A B = Do Re Mi Fa Sol La Si',
    '# Durada: 4=negra  8=corchea  2=blanca  1=redona',
    '',
    "escala = ['C4:4','D4:4','E4:4','F4:4','G4:4','A4:4','B4:4','C5:4']",
    'music.play(escala)'
  ])}

  <h3>✏️ Exercici 7.1 — Compositor ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise">
    <span class="box-icon">✏️</span>
    <div class="box-body">
      <p>Compon una melodia pròpia d\'almenys <strong>8 notes</strong>.</p>
      <p>Utilitza almenys 2 durades diferents (4 i 8).</p>
      <p>Dóna-li un nom i documenta amb comentaris quina part és l\'estrofa i quina l\'estrebada.</p>
    </div>
  </div>

  ${duaBox('ace', [
    '<strong>Opció sonora:</strong> compondre directament en codi.',
    '<strong>Opció visual:</strong> escriure les notes en un pentagrama o taula (Do-Re-Mi...) i després transferir al codi.',
    '<strong>Opció corporal:</strong> tocar la melodia amb body percussion i després transcriure-la.',
    '<strong>Opció investigació:</strong> transcriure al codi una melodia existent que ja coneixes.'
  ])}
  ${duaBox('imp', [
    '<strong>Elecció total:</strong> l\'alumne tria quina melodia compon. Sense restriccions d\'estil. Rap, clàssica, pop, inventada...',
    '<strong>Col·laboració interdisciplinar:</strong> coordina amb el/la professor/a de Música perquè l\'exercici compti també com a activitat d\'aquella assignatura.'
  ])}

  <h2>7.3 Síntesi de veu (Speech)</h2>
  <p>La micro:bit no només pot emetre notes, sinó també "parlar" i "cantar" mitjançant el mòdul <code>speech</code>. Això permet crear projectes molt més narratius i inclusius.</p>
  
  ${codeBlock('hola_mon.py', [
    'from microbit import *',
    'import speech',
    '',
    '# Salutació bàsica en anglès',
    'speech.say("Hello world")',
    'sleep(500)',
    '',
    '# Personalitzar la veu',
    '# speed (0-255), pitch (0-255), throat (0-255), mouth (0-255)',
    'speech.say("I am a robot", speed=80, pitch=100, throat=200, mouth=150)'
  ])}

  ${duaBox('rep', [
    '<strong>Multimodalitat:</strong> sempre que la micro:bit "parli", hem de mostrar el text o una icona a la matriu LED per als alumnes amb discapacitat auditiva.',
    '<strong>Suport visual:</strong> utilitza <code>display.scroll()</code> o <code>display.show()</code> abans de cada <code>speech.say()</code>.'
  ])}

  ${codeBlock('narrador.py', [
    'from microbit import *',
    'import speech',
    '',
    'paraules = ["Hello", "Happy", "Microbit"]',
    '',
    'for p in paraules:',
    '    display.scroll(p, wait=False)',
    '    speech.say(p)',
    '    sleep(1000)'
  ])}

  <h3>Cantar i fonemes</h3>
  <p>Per a un control total, podem utilitzar fonemes. Això és útil per a paraules en català, ja que el motor de veu està optimitzat per a l\'anglès.</p>
  
  ${codeBlock('cantar.py', [
    'from microbit import *',
    'import speech',
    '',
    '# "Bon dia" utilitzant fonemes (aproximació)',
    'speech.pronounce("BOHN DIYAA")',
    '',
    '# Cantar una nota específica',
    '# Format: [fonema][tono]',
    'speech.sing("HAY2LOOOO4")'
  ])}

  <h3>✏️ Exercici 7.2 — El robot poliglota ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise">
    <span class="box-icon">✏️</span>
    <div class="box-body">
      <p>Crea un programa on la micro:bit digui una frase diferent segons el botó que premis (A o B).</p>
      <p><strong>Requisit:</strong> Una frase ha de ser una salutació i l\'altra un advertiment.</p>
      <p><strong>DUA:</strong> El text ha d\'aparèixer simultàniament a la pantalla LED.</p>
    </div>
  </div>

  ${duaBox('ace', [
    '<strong>Flexibilitat:</strong> l\'alumne pot triar si el robot parla en anglès (natural) o intenta "parlar" català utilitzant fonemes.',
    '<strong>Expressió:</strong> permet ajustar els paràmetres <code>pitch</code> i <code>speed</code> per donar-li "personalitat" (veu de gegant, veu de ratolí, veu trista...).'
  ])}

  <h2>7.4 Freqüències i xiulets</h2>
  ${codeBlock('frequencies.py', [
    'from microbit import *',
    'import music',
    '',
    '# music.pitch(frequencia_Hz, durada_ms)',
    'music.pitch(440, 500)     # La4 durant 0,5 segons',
    'sleep(200)',
    'music.pitch(880, 500)     # La5 (el doble = octava superior)',
    '',
    '# Sirena d\'emergència',
    'for i in range(5):',
    '    music.pitch(800, 200)',
    '    music.pitch(600, 200)'
  ])}

  ${noteBox([
    'Escala musical en Hz: Do=262, Re=294, Mi=330, Fa=349, Sol=392, La=440, Si=494.',
    'Duplicar la freqüència equival a pujar una octava.',
    'music.pitch() requereix altaveu (integrat en v2, o extern als pins 0 i GND per a v1).'
  ])}
\`;
document.getElementById('mc').innerHTML = contentHTML;
</script>
</body>
</html>
