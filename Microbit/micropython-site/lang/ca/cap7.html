<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>So i Música — MicroPython a l'Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🎵 Capítol 07</div>
      <h1>So i Música</h1>
      <p class="subtitle">Melodies predefinides, composició amb notes i freqüències en Hz.</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap7');
document.getElementById('mc').innerHTML=`

  ${duaBox('rep',['<strong>Accessibilitat auditiva:</strong> per a alumnes amb hipoacúsia, substitueix music.play() per display.show(). El capítol és totalment accessible en mode visual.', 'Els alumnes amb sensibilitat auditiva poden treballar amb auriculars o amb el volum baix.'])}
  <h2>7.1 Melodies predefinides</h2>
  ${codeBlock('melodies.py',['from microbit import *', 'import music', '', 'music.play(music.BIRTHDAY)', 'sleep(500)', 'music.play(music.POWER_UP)', 'sleep(500)'])}
  ${table(['Melodia', 'Descripció'],[['music.BIRTHDAY', 'Aniversari feliç'], ['music.POWER_UP', 'Inici/Victòria'], ['music.POWER_DOWN', 'Derrota'], ['music.FUNERAL', 'Marxa fúnebre'], ['music.BA_DING', 'Notificació']])}
  <h2>7.2 Composició amb notes</h2>
  ${codeBlock('scale.py',['from microbit import *', 'import music', '', "# Format: 'NOTE OCTAVE : DURATION'", '# Notes: C D E F G A B', '# Duration: 4=quarter 8=eighth 2=half 1=whole', '', "scale = ['C4:4','D4:4','E4:4','F4:4',", "         'G4:4','A4:4','B4:4','C5:4']", 'music.play(scale)'])}
  ${noteBox(['Escala en Hz: C=262, D=294, E=330, F=349, G=392, A=440, B=494.', 'Duplicar la freqüència = pujar una octava.'])}
  <h3>✏️ Exercici 7.1 — Compositor ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Composa una melodia pròpia d'almenys 8 notes amb 2 durades diferents. Dóna-li un nom i documenta-la amb comentaris.</p>
  </div></div>
  ${duaBox('ace',['<strong>Opció visual:</strong> escriu les notes en un pentagrama o taula (Do-Re-Mi...) i llavors transcriu al codi.', '<strong>Opció oral:</strong> cantusseja la melodia mentre la micro:bit la reprodueix.', '<strong>Opció lliure:</strong> transcriu al codi una melodia existent que ja coneixes.'])}
  ${duaBox('imp',["<strong>Elecció total:</strong> l'alumne tria quina melodia composa. Sense restriccions d'estil. Rap, clàssica, pop, inventada..."])}
`;
</script>
</body>
</html>
