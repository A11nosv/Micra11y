<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sonido y Música — MicroPython en el Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🎵 Capítulo 07</div>
      <h1>Sonido y Música</h1>
      <p class="subtitle">Melodías predefinidas, composición con notas y frecuencias en Hz.</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap7');
document.getElementById('mc').innerHTML=`

  ${duaBox('rep',['<strong>Accesibilidad auditiva:</strong> para alumnos con hipoacusia, reemplaza music.play() con display.show(). El capítulo es completamente accesible en modo visual.', 'Los alumnos con sensibilidad auditiva pueden trabajar con auriculares o con el volumen bajo.'])}
  <h2>7.1 Melodías predefinidas</h2>
  ${codeBlock('melodies.py',['from microbit import *', 'import music', '', 'music.play(music.BIRTHDAY)', 'sleep(500)', 'music.play(music.POWER_UP)', 'sleep(500)'])}
  ${table(['Melodía', 'Descripción'],[['music.BIRTHDAY', 'Cumpleaños feliz'], ['music.POWER_UP', 'Inicio/Victoria'], ['music.POWER_DOWN', 'Derrota'], ['music.FUNERAL', 'Marcha fúnebre'], ['music.BA_DING', 'Notificación']])}
  <h2>7.2 Composición con notas</h2>
  ${codeBlock('scale.py',['from microbit import *', 'import music', '', "# Format: 'NOTE OCTAVE : DURATION'", '# Notes: C D E F G A B', '# Duration: 4=quarter 8=eighth 2=half 1=whole', '', "scale = ['C4:4','D4:4','E4:4','F4:4',", "         'G4:4','A4:4','B4:4','C5:4']", 'music.play(scale)'])}
  ${noteBox(['Escala en Hz: C=262, D=294, E=330, F=349, G=392, A=440, B=494.', 'Duplicar la frecuencia = subir una octava.'])}
  <h3>✏️ Ejercicio 7.1 — Compositor ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Compón una melodía propia de al menos 8 notas con 2 duraciones diferentes. Dale un nombre y documéntala con comentarios.</p>
  </div></div>
  ${duaBox('ace',['<strong>Opción visual:</strong> escribe las notas en un pentagrama o tabla (Do-Re-Mi...) y luego transcribe al código.', '<strong>Opción oral:</strong> tararea la melodía mientras la micro:bit la reproduce.', '<strong>Opción libre:</strong> transcribe al código una melodía existente que ya conozcas.'])}
  ${duaBox('imp',['<strong>Elección total:</strong> el alumno elige qué melodía compone. Sin restricciones de estilo. Rap, clásica, pop, inventada...'])}
`;
</script>
</body>
</html>
