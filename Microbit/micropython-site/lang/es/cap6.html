<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sensores — MicroPython en el Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🌡️ Capítulo 06</div>
      <h1>Sensores</h1>
      <p class="subtitle">Acelerómetro, gestos, sensor de luz y temperatura, y micrófono (v2).</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap6');
document.getElementById('mc').innerHTML=`

  <h2>6.1 El acelerómetro</h2>
  ${duaBox('rep',['<strong>Demo en vivo:</strong> pasa la micro:bit de mano en mano mientras el simulador muestra los valores en tiempo real.', '<strong>Conexión con Ciencias:</strong> la gravedad terrestre es 1g ≈ 1000 en la escala de la micro:bit.'])}
  ${codeBlock('accel.py',['from microbit import *', '', 'while True:', '    x = accelerometer.get_x()', '    y = accelerometer.get_y()', '    z = accelerometer.get_z()', '    display.scroll(str(x))', '    sleep(500)'])}
  ${codeBlock('bubble.py',['from microbit import *', '', 'while True:', '    x = accelerometer.get_x()', '    y = accelerometer.get_y()', '    col  = min(4, max(0, 2 + x // 500))', '    row  = min(4, max(0, 2 + y // 500))', '    display.clear()', '    display.set_pixel(col, row, 9)', '    sleep(50)'])}
  <h2>6.2 Gestos predefinidos</h2>
  ${table(['Gesto', 'Movimiento'],[["'shake'", 'Agitar'], ["'up'", 'Pantalla hacia arriba'], ["'left'/'right'", 'Inclinada'], ["'face up'", 'Plana cara arriba'], ["'3g'/'6g'", 'Sacudida fuerte']])}
  <h3>✏️ Ejercicio 6.1 — Dado electrónico ${level(1)} ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Al agitar la micro:bit, muestra un número del 1 al 6. El resultado se mantiene hasta la próxima sacudida.</p>
  </div></div>
  <h2>6.3 Sensores de luz y temperatura</h2>
  ${codeBlock('sensors.py',['from microbit import *', '', 'while True:', '    light = display.read_light_level()', '    temp  = temperature()', '    if light < 50:', '        display.show(Image.ASLEEP)', '    elif temp > 28:', '        display.show(Image.SURPRISED)', '    else:', '        display.show(Image.HAPPY)', '    sleep(1500)'])}
  ${warnBox(['El micrófono solo está disponible en micro:bit v2. En v1 dará error.'])}
`;
</script>
</body>
</html>
