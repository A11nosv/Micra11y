<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Referencia Rápida de MicroPython — MicroPython en el Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">📋 Apéndice</div>
      <h1>Referencia Rápida de MicroPython</h1>
      <p class="subtitle">Funciones clave, errores frecuentes y glosario DUA para tener a mano en el aula.</p>
      <div class="header-badges"><span class="badge badge-blue">📋</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('apendice');
document.getElementById('mc').innerHTML=`

  <h2>A.1 Pantalla LED</h2>
  ${codeBlock('ref_screen.py',['from microbit import *', 'display.show(Image.HAPPY)         # Show image', "display.scroll('text')            # Scroll text", 'display.clear()                   # Turn off all LEDs', 'display.set_pixel(x, y, b)        # Set pixel (b = 0-9)', 'display.read_light_level()        # Light sensor (0-255)'])}
  <h2>A.2 Botones y Sensores</h2>
  ${codeBlock('ref_input.py',['button_a.is_pressed()   # True if pressed now', 'button_a.was_pressed()  # True since last check', 'accelerometer.get_x()  # X axis (-2000 to +2000)', 'accelerometer.current_gesture()  # shake/up/down/left/right', 'temperature()           # Chip temperature in Celsius'])}
  <h2>A.3 Tiempo y Azar</h2>
  ${codeBlock('ref_time.py',['sleep(ms)              # Pause (1000 = 1 second)', 'import random', 'random.randint(a, b)   # Random integer [a, b]', 'random.choice(lst)     # Random element from list'])}
  <h2>A.4 Música</h2>
  ${codeBlock('ref_music.py',['import music', 'music.play(music.BIRTHDAY)', "music.play(['C4:4', 'D4:4'])   # Note list", 'music.pitch(freq, dur)         # Hz, milliseconds', '# Notes: C D E F G A B'])}
  <h2>A.5 Radio</h2>
  ${codeBlock('ref_radio.py',['import radio', 'radio.on()             # Always first!', 'radio.config(group=N)  # Channel 1-255', "radio.send('msg')      # Send text", 'radio.receive()        # Receive text (None if empty)'])}
  <h2>A.6 Errores frecuentes</h2>
  ${table(['Error', 'Causa', 'Solución'],[['SyntaxError', "Falta ':' o comillas sin cerrar.", 'Revisa la línea indicada.'], ['IndentationError', 'Mezcla de espacios y tabuladores.', 'Re-indenta con 4 espacios.'], ['TypeError', 'Concatenar número y texto directamente.', "str(number) + 'text'"], ['NameError', 'Variable usada antes de definirse.', "Define la variable con '=' primero."]])}
  <h2>A.7 Glosario DUA</h2>
  ${table(['Término', 'Definición', 'Metáfora'],[['variable', 'Espacio para guardar un valor.', 'Caja etiquetada.'], ['if / else', 'Ejecuta código según condición.', 'Semáforo.'], ['while / for', 'Repite un bloque de código.', 'Lavadora.'], ['def', 'Define función reutilizable.', 'Receta con nombre.'], ['sleep()', 'Pausa la ejecución.', 'El programa echa una siesta.'], ['True / False', 'Dos únicos valores booleanos.', 'Interruptor on/off.']])}
  <div style="text-align:center;margin-top:48px;padding-top:24px;border-top:2px solid var(--paper2)">
    <p style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--blue);font-style:italic;margin-bottom:8px">
      ¡Buena suerte programando con tus alumnos!
    </p>
    <p style="color:var(--ink2);font-style:italic">
      Diseñar para la diversidad no es diseñar para unos pocos. Es diseñar mejor para todos.
    </p>
  </div>
`;
</script>
</body>
</html>
