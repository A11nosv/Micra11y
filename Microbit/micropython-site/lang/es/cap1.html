<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preparando el Entorno de Trabajo — MicroPython en el Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🖥️ Capítulo 01</div>
      <h1>Preparando el Entorno de Trabajo</h1>
      <p class="subtitle">Material necesario, el editor online y los primeros programas.</p>
      <div class="header-badges"><span class="badge badge-green">${level(1)}</span><span class="badge badge-amber">${level(2)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap1');
document.getElementById('mc').innerHTML=`

  <h2>1.1 Material necesario</h2>
  <ul>
    <li><strong>micro:bit v1 o v2</strong> — la v2 tiene micrófono y altavoz integrados.</li>
    <li><strong>Cable USB</strong> micro-USB a USB-A estándar.</li>
    <li><strong>Ordenador o tablet</strong> con navegador moderno (Chrome recomendado).</li>
    <li><strong>Editor online</strong> <a href='https://python.microbit.org' target='_blank'>python.microbit.org</a> — gratuito, sin instalación.</li>
  </ul>
  ${noteBox(['La micro:bit v2 es recomendable para 5.º de Primaria en adelante.', 'Un juego de 6-8 micro:bits en rotación es suficiente para 30 alumnos.', 'El editor funciona también en tablets con teclado Bluetooth.'])}
  ${duaBox('rep',['<strong>Metáfora:</strong> el programa es como una receta: primero dices los ingredientes (import), luego los pasos (display.scroll).', "<strong>Multimodal:</strong> haz que los alumnos 'actúen' el programa antes de escribirlo.", '<strong>Glosario visual:</strong> cartel en el aula con los términos nuevos: import, display, scroll.'])}
  <h2>1.2 El Editor Online</h2>
  <p>Visita <a href="https://python.microbit.org" target="_blank">python.microbit.org</a> desde cualquier navegador. Sin cuenta ni instalación.</p>
  ${table(['Zona del editor', 'Función', 'Para qué'],[['Panel izquierdo', 'Código Python', 'Escribir programas'], ['Simulador central', 'Vista previa', 'Probar sin placa'], ['Consola inferior', 'Errores y print()', 'Depurar'], ['Botón Flash', 'Envía a la placa', 'Cargar programa'], ['Referencia API', 'Documentación', 'Consultar']])}
  <h2>1.3 Tu primer programa</h2>
  <p>Escribe el código en el editor y pulsa <strong>Flash</strong>:</p>
  ${codeBlock('hola_full.py',['# First MicroPython program', '# # marks a comment: Python ignores it', '', 'from microbit import *', '', "display.scroll('Hello world!')"])}
  ${table(['Línea de código', '¿Qué hace?'],[['# First program...', 'Comentario: Python lo ignora.'], ['from microbit import *', 'Importa todas las funciones. SIEMPRE primera línea.'], ["display.scroll('Hello world!')", 'Desplaza el texto por los LEDs.']])}
  ${duaBox('rep',['<strong>Metáfora:</strong> el programa es como una receta: primero dices los ingredientes (import), luego los pasos (display.scroll).', "<strong>Multimodal:</strong> haz que los alumnos 'actúen' el programa antes de escribirlo.", '<strong>Glosario visual:</strong> cartel en el aula con los términos nuevos: import, display, scroll.'])}
  <h3>✏️ Ejercicio 1.1 — Presentación personal ${level(1)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Modifica el programa para que la micro:bit muestre <strong>tu nombre</strong>.</p><p>Después, haz que muestre también tu edad.</p><p><em>Extensión:</em> ¿puedes añadir Image.HEART?</p>
  </div></div>
  ${duaBox('ace',['<strong>Opción A:</strong> escribe el código modificando el ejemplo.', "<strong>Opción B (plantilla):</strong> <code>display.scroll('____')</code>", '<strong>Opción C (verbal):</strong> dicta a un compañero/a que escribe.', '<strong>Opción D (extensión):</strong> busca Image.HEART y otras imágenes.'])}
  ${duaBox('imp',['<strong>Elección:</strong> cada alumno elige qué mostrar: nombre, apodo, emoji favorito.', '<strong>Logro visible:</strong> ver el nombre propio en los LEDs es el primer bucle de causa-efecto.'])}
  <h2>1.4 Imágenes predefinidas</h2>
  ${codeBlock('images.py',['from microbit import *', '', 'display.show(Image.HAPPY)    # Happy face', 'sleep(1000)                  # Wait 1 second', 'display.show(Image.SAD)      # Sad face', 'sleep(1000)', 'display.show(Image.HEART)    # Heart'])}
  ${noteBox(['sleep() recibe milisegundos: 1000 = 1 segundo.', 'Banco de imágenes: Image.HAPPY, Image.SAD, Image.SURPRISED, Image.HEART, Image.ARROW_N...'])}
  <h3>✏️ Ejercicio 1.2 — Historia emocional ${level(1)} ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Crea una secuencia de al menos <strong>5 imágenes</strong> que cuenten una historia.</p><p>Usa sleep() para que cada imagen dure un tiempo diferente.</p><p>Ejemplo: HAPPY → HEART → SAD → NO → HAPPY</p>
  </div></div>
`;
</script>
</body>
</html>
