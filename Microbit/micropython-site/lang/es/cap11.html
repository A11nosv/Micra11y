<head>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">♿ Capítulo 11</div>
      <h1>Accesibilidad y Diseño</h1>
      <p class="subtitle">Creación de productos finales accesibles: interfaces físicas adaptadas, salidas multimodales y código inclusivo.</p>
      <div class="header-badges">
        <span class="badge badge-blue">Educadores</span>
        <span class="badge badge-purple">Diseño Inclusivo</span>
        <span class="badge badge-info">A11Y</span>
      </div>

    <div id="page-nav"></div>

<script src="nav.js"></script>
<script>
initPage('cap11');
document.getElementById('mc').innerHTML = `
  <h2>11.1 Salidas Multimodales</h2>
  <p>Diseña tus proyectos para que funcionen con múltiples salidas sensoriales (visual, sonora, táctil) y sean accesibles para todos.</p>
  
  ${codeBlock('multimodal_saludo.py', [
    'from microbit import *',
    'import music',
    '',
    'while True:',
    '    if button_a.is_pressed():',
    '        display.show(Image.HEART)',
    '        music.play(music.PYTHON) # Sonido corto de Python',
    '    elif button_b.is_pressed():',
    '        display.scroll("A11Y")',
    '        music.pitch(440, 500) # Nota La4 por 0.5 seg',
    '    else:',
    '        display.clear()',
    '        music.stop() # Detener sonido si no hay acción',
    '    sleep(100)'
  ])}

  ${noteBox([
    '<strong>Redundancia:</strong> Siempre que sea posible, combina la información visual (LEDs, texto) con la sonora (pitidos, música). Esto beneficia a alumnos con baja visión, sordera o dificultades de atención.'
  ])}

  <h2>11.2 Interfaces físicas adaptadas</h2>
  <p>Crea controles más grandes y fáciles de usar mediante los pines de la micro:bit y materiales conductores.</p>

  ${codeBlock('botones_gigantes.py', [
    'from microbit import *',
    '',
    '# Pines 0 y 1 como entradas (botones)',
    '# Conectar pin 0 a GND para pulsar botón GRANDE',
    '',
    'while True:',
    '    if pin0.is_touched(): # Detecta si el pin está conectado a GND',
    '        display.show(Image.YES)',
    '    elif pin1.is_touched():',
    '        display.show(Image.NO)',
    '    else:',
    '        display.clear()',
    '    sleep(50)'
  ])}

  ${exerciseBox('Reto: Botón Gigante', [
    'Crea un "pulsador" gigante usando papel de aluminio y pinzas de cocodrilo. Que al tocarlo, la micro:bit muestre un emoticono.'
  ])}

  <h2>11.3 Código Inclusivo para Lectores de Pantalla</h2>
  <p>Escribe código que sea fácil de entender y navegar, tanto para tus alumnos como para ti si usas lectores de pantalla.</p>

  ${codeBlock('asistente_acelerometro.py', [
    'from microbit import *',
    '',
    '# Ejemplo conceptual de control adaptado',
    'while True:',
    '    x = accelerometer.get_x()',
    '    y = accelerometer.get_y()',
    '',
    '    # Usa nombres de variables descriptivos',
    '    # Añade comentarios claros explicando la lógica',
    '',
    '    if button_a.was_pressed():',
    '        print("MOUSE_LEFT_CLICK")',
    '',
    '    sleep(50)'
  ])}

  ${tipBox([
    '<strong>Buenas prácticas:</strong> Usa nombres de variables descriptivos (ej: <code>nivel_luz</code> en lugar de <code>nl</code>). Añade comentarios claros explicando bloques de código complejos. Evita anidar excesivamente los condicionales.'
  ])}
`;
</script>
