<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proyectos Completos con Adaptaciones DUA — MicroPython en el Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🚀 Capítulo 09</div>
      <h1>Proyectos Completos con Adaptaciones DUA</h1>
      <p class="subtitle">Cuatro proyectos con tres niveles DUA. Todo el grupo trabaja el mismo proyecto.</p>
      <div class="header-badges"><span class="badge badge-green">${level(1)}</span><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span><span class="badge badge-blue">${level(4)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap9');
document.getElementById('mc').innerHTML=`

  ${noteBox(['Principio DUA: todos los alumnos trabajan el MISMO proyecto, con diferente nivel de apoyo. Esto evita la estigmatización.', 'El nivel no es fijo: un alumno puede empezar en Nivel 1 y avanzar al Nivel 2 o 3 durante la sesión.'])}
  <h2>Proyecto 1 — Mi Robot Emocional ${level(1)}</h2>
  ${codeBlock('robot.py',['from microbit import *', '', 'display.show(Image.HAPPY)', '', 'while True:', "    if accelerometer.current_gesture() == 'shake':", '        display.show(Image.SURPRISED)', '        sleep(1000)', '        display.show(Image.HAPPY)', '    if button_a.is_pressed():', '        display.show(Image.SAD)', '        sleep(800)', '        display.show(Image.HAPPY)', '    if button_b.is_pressed():', '        display.show(Image.ASLEEP)', '        sleep(2000)', '        display.show(Image.HAPPY)', '    sleep(100)'])}
  ${duaBox('ace',['<strong>Nivel 1 — Plantilla:</strong> código ya escrito, el alumno solo cambia imágenes y tiempos.', '<strong>Nivel 2 — Estándar:</strong> código guiado del ejemplo.', '<strong>Nivel 3 — Extensión libre:</strong> añade sonidos, temperatura y emociones propias.'])}
  ${duaBox('imp',["<strong>Motivación intrínseca:</strong> el robot tiene el nombre y personalidad que el alumno eligió. No es 'el robot del ejercicio', es 'su robot'."])}
  <h2>Proyecto 2 — Podómetro ${level(2)}</h2>
  ${codeBlock('pedo.py',['from microbit import *', '', 'steps  = 0', 'last_z = accelerometer.get_z()', 'thresh = 400', '', 'while True:', '    z    = accelerometer.get_z()', '    diff = abs(z - last_z)', '    if diff > thresh:', '        steps += 1', '        display.show(str(steps % 10))', '    last_z = z', '    if button_a.was_pressed():', '        display.scroll(str(steps))', '    if button_b.was_pressed():', '        steps = 0', '    sleep(50)'])}
  ${duaBox('imp',['<strong>Fuera del aula:</strong> lleva la sesión al patio. Los alumnos prueban el podómetro caminando, corriendo, subiendo escaleras y comparan resultados.'])}
  <h2>Proyecto 3 — Estación Meteorológica ${level(3)}</h2>
  ${codeBlock('weather.py',['from microbit import *', '', 'readings = []', '', 'def cal_temp():', '    return temperature() - 3', '', 'def mean(lst):', '    return sum(lst)/len(lst) if lst else 0', '', 'def record():', '    t = cal_temp()', '    readings.append(t)', '    if len(readings) > 10:', '        readings.pop(0)', '    return t', '', 'while True:', '    t = record()', "    display.scroll(str(t) + 'C', delay=70)", '    if button_a.was_pressed():', '        display.scroll(str(round(mean(readings),1)))', '    sleep(5000)'])}
  <h2>Proyecto 4 — Sistema de Control de Acceso ${level(4)}</h2>
  ${codeBlock('lock.py',['from microbit import *', 'import radio', '', 'radio.on()', 'radio.config(group=42)', '', "PASSWORD = '2024micro'", 'attempts = 0', 'locked   = False', '', 'def open_door():', '    display.show(Image.YES)', '    sleep(2000)', '    display.clear()', '', 'def lock_out():', '    global locked', '    locked = True', "    display.scroll('LOCKED')", '', 'while True:', '    msg = radio.receive()', '    if msg and not locked:', '        if msg == PASSWORD:', '            attempts = 0', '            open_door()', '        else:', '            attempts += 1', '            if attempts >= 3:', '                lock_out()', '    sleep(100)'])}
  ${duaBox('imp',['<strong>Debate ético:</strong> ¿qué datos debe almacenar un sistema de acceso? ¿Cuánto tiempo? ¿Quién los puede ver? Conecta con el RGPD.', '<strong>Comparación con lo real:</strong> tarjeta del metro, huella dactilar, reconocimiento facial. ¿Cuál es más seguro? ¿Cuál respeta más la privacidad?'])}
`;
</script>
</body>
</html>
