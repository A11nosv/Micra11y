<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proiektu Osoak DBU Egokitzapenekin — MicroPython Ikasgelan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🚀 Kapitulua 09</div>
      <h1>Proiektu Osoak DBU Egokitzapenekin</h1>
      <p class="subtitle">Lau proiektu hiru DBU mailarekin. Talde osoak proiektu bera egiten du.</p>
      <div class="header-badges"><span class="badge badge-green">${level(1)}</span><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span><span class="badge badge-blue">${level(4)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap9');
document.getElementById('mc').innerHTML=`

  ${noteBox(['DBU printzipioa: ikasle guztiak PROIEKTU BERA egiten dute, laguntza-maila ezberdinekin. Honek estigmatizazioa ekiditen du.', 'Maila ez da finkoa: ikasle batek 1. mailatik hasi eta saioaren bitartean 2. edo 3. mailara aurreratu dezake.'])}
  <h2>1. Proiektua — Nire Robot Emozionala ${level(1)}</h2>
  ${codeBlock('robot.py',['from microbit import *', '', 'display.show(Image.HAPPY)', '', 'while True:', "    if accelerometer.current_gesture() == 'shake':", '        display.show(Image.SURPRISED)', '        sleep(1000)', '        display.show(Image.HAPPY)', '    if button_a.is_pressed():', '        display.show(Image.SAD)', '        sleep(800)', '        display.show(Image.HAPPY)', '    if button_b.is_pressed():', '        display.show(Image.ASLEEP)', '        sleep(2000)', '        display.show(Image.HAPPY)', '    sleep(100)'])}
  ${duaBox('ace',['<strong>1. maila — Txantiloia:</strong> kodea idatzirik dago, ikasleak irudiak eta denborak soilik aldatzen ditu.', '<strong>2. maila — Estandarra:</strong> adibideko kode gidatua.', '<strong>3. maila — Hedapen librea:</strong> gehitu soinuak, tenperatura eta norberaren emozioak.'])}
  ${duaBox('imp',["<strong>Barneko motibazioa:</strong> robotak ikasleak aukeratutako izena eta nortasuna du. Ez da 'ariketako robota', bere robota da."])}
  <h2>2. Proiektua — Urratsometroa ${level(2)}</h2>
  ${codeBlock('pedo.py',['from microbit import *', '', 'steps  = 0', 'last_z = accelerometer.get_z()', 'thresh = 400', '', 'while True:', '    z    = accelerometer.get_z()', '    diff = abs(z - last_z)', '    if diff > thresh:', '        steps += 1', '        display.show(str(steps % 10))', '    last_z = z', '    if button_a.was_pressed():', '        display.scroll(str(steps))', '    if button_b.was_pressed():', '        steps = 0', '    sleep(50)'])}
  ${duaBox('imp',['<strong>Gela kanpoan:</strong> eraman saioa jolastokira. Ikasleek urratsometroa probatzen dute oinez, lasterka, eskailerak igoz eta emaitzak alderatzen dituzte.'])}
  <h2>3. Proiektua — Eguraldi-estazioa ${level(3)}</h2>
  ${codeBlock('weather.py',['from microbit import *', '', 'readings = []', '', 'def cal_temp():', '    return temperature() - 3', '', 'def mean(lst):', '    return sum(lst)/len(lst) if lst else 0', '', 'def record():', '    t = cal_temp()', '    readings.append(t)', '    if len(readings) > 10:', '        readings.pop(0)', '    return t', '', 'while True:', '    t = record()', "    display.scroll(str(t) + 'C', delay=70)", '    if button_a.was_pressed():', '        display.scroll(str(round(mean(readings),1)))', '    sleep(5000)'])}
  <h2>4. Proiektua — Sarbide-kontrol Sistema ${level(4)}</h2>
  ${codeBlock('lock.py',['from microbit import *', 'import radio', '', 'radio.on()', 'radio.config(group=42)', '', "PASSWORD = '2024micro'", 'attempts = 0', 'locked   = False', '', 'def open_door():', '    display.show(Image.YES)', '    sleep(2000)', '    display.clear()', '', 'def lock_out():', '    global locked', '    locked = True', "    display.scroll('LOCKED')", '', 'while True:', '    msg = radio.receive()', '    if msg and not locked:', '        if msg == PASSWORD:', '            attempts = 0', '            open_door()', '        else:', '            attempts += 1', '            if attempts >= 3:', '                lock_out()', '    sleep(100)'])}
  ${duaBox('imp',['<strong>Etika-eztabaida:</strong> zer datu gorde behar ditu sarbide-sistemak? Zenbat denboraz? Nork ikus ditzake? Lotu EDAOrekin.', '<strong>Errealitatearekin konparaketa:</strong> metro-txartela, hatz-marka, aurpegi-ezagupena. Zein da seguruagoa? Zeinek errespetatzen du pribatutasuna gehiago?'])}
`;
</script>
</body>
</html>
