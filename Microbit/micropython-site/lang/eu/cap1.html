  <h2>1.1 Beharrezko materiala</h2>
  <ul>
    <li><strong>micro:bit v1 edo v2</strong> — v2-ak mikrofono eta bozgorailuak ditu.</li>
    <li><strong>USB kablea</strong> micro-USB-tik USB-A estandarrera.</li>
    <li><strong>Ordenagailua edo tableta</strong> nabigatzaile modernoarekin (Chrome gomendatua).</li>
    <li><strong>Lineako editorea</strong> <a href='https://python.microbit.org' target='_blank'>python.microbit.org</a> — doan, instalaziorik gabe.</li>
  </ul>
  ${noteBox(['micro:bit v2 gomendatzen da LHko 5. mailatik aurrera.', '6-8 micro:bit txandaka erabiltzea nahikoa da 30 ikaslerako.', 'Editoreak Bluetooth teklatuarekin ere funtzionatzen du tabletetan.'])}
  ${duaBox('rep',['<strong>Metafora:</strong> programa errezeta bat bezalakoa da: lehenik osagaiak zerrendatzen dituzu (import), gero urratsak (display.scroll).', "<strong>Multimodal:</strong> ikasleei programa 'antzeztera' eskatu idatzi aurretik.", '<strong>Ikusizko hiztegia:</strong> termino berri guztiekin gelan kartela: import, display, scroll.'])}
  <h2>1.2 Lineako Editorea</h2>
  <p>Bisitatu <a href="https://python.microbit.org" target="_blank">python.microbit.org</a> edozein nabigatzailetik. Ez du konturik edo instalaziorik behar.</p>
  ${table(['Editoreko eremua', 'Funtzioa', 'Noiz'],[['Ezkerreko panela', 'Python kodea', 'Programak idatzi'], ['Erdiko simulagailua', 'Aurrebista', 'Plaka gabe probatu'], ['Beheko kontsola', 'Erroreak eta print()', 'Arazkatu'], ['Flash botoia', 'Plakara bidali', 'Kargatu'], ['API Erreferentzia', 'Dokumentazioa', 'Kontsultatu']])}

  ${duaBox('rep',['<strong>Metafora:</strong> programa errezeta bat bezalakoa da: lehenik osagaiak zerrendatzen dituzu (import), gero urratsak (display.scroll).', "<strong>Multimodal:</strong> ikasleei programa 'antzeztera' eskatu idatzi aurretik.", '<strong>Ikusizko hiztegia:</strong> termino berri guztiekin gelan kartela: import, display, scroll.'])}

  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Aldatu programa micro:bit-ek <strong>zure izena</strong> erakuts dezan.</p><p>Ondoren, zure adina ere erakuts dezala.</p><p><em>Hedapena:</em> Image.HEART gehitu al dezakezu?</p>
