<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conditionals — MicroPython in the Classroom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🚦 Chapter 03</div>
      <h1>Conditionals</h1>
      <p class="subtitle">if/elif/else, logical operators and using buttons A and B.</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap3');
document.getElementById('mc').innerHTML=`

  <h2>3.1 The if / elif / else structure</h2>
  <p>Conditionals let the program make decisions. Like a traffic light: if red, stop; if green, go.</p>
  ${duaBox('rep',["<strong>Unplugged activity:</strong> 'IF you are wearing trainers → stand up; ELSE → stay seated'. Students live the conditional with their bodies.", '<strong>Flowchart:</strong> draw a decision diamond with YES/NO on the board before opening the editor.'])}
  ${codeBlock('cond.py',['from microbit import *', '', 'temp = temperature()', '', 'if temp > 30:', '    display.show(Image.HAPPY)', 'elif temp > 20:', "    display.scroll('OK')", 'elif temp > 10:', "    display.scroll('Cool')", 'else:', '    display.show(Image.SAD)'])}
  ${conceptBox(['INDENTATION: code inside if must be indented 4 spaces. In Python this is MANDATORY.', 'if condition:       ← colon is required', '    true_code       ← only runs if condition is True'])}
  <h2>3.2 Operators</h2>
  ${table(['Op.', 'Example'],[['==', 'Equal: x == 5'], ['!=', 'Not equal: x != 0'], ['> <', 'Greater/less: x > 10'], ['and', 'Logical AND: x > 0 and x < 10'], ['or', 'Logical OR'], ['not', 'Negation']])}
  <h2>3.3 Buttons A and B</h2>
  ${codeBlock('buttons.py',['from microbit import *', '', 'while True:', '    if button_a.is_pressed():', '        display.show(Image.HAPPY)', '    elif button_b.is_pressed():', '        display.show(Image.SAD)', '    elif button_a.is_pressed() and button_b.is_pressed():', '        display.show(Image.SURPRISED)', '    else:', '        display.clear()', '    sleep(100)'])}
  ${noteBox(['is_pressed() → True if pressed right now.', 'was_pressed() → True if pressed since last check.'])}
  <h3>✏️ Exercise 3.1 — Traffic light ${level(1)} ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <ul>
      <li>Button A → Image.NO (red — STOP)</li>
      <li>Button B → Image.ARROW_N (green — GO)</li>
      <li>No button → Image.DIAMOND (yellow — WAIT)</li>
    </ul>
  </div></div>
  ${duaBox('ace',['<strong>Basic level:</strong> only 2 buttons.', '<strong>Standard level:</strong> all 3 states.', '<strong>Advanced level:</strong> add a counter of people who pass.'])}
  <h3>✏️ Exercise 3.2 — Rock, Paper, Scissors ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Button A → Rock | Button B → Paper | Both → Scissors</p>
    <p><code>import random</code> → <code>random.randint(0, 2)</code></p>
  </div></div>
  ${codeBlock('rps.py',['from microbit import *', 'import random', '', "opts = ['Rock', 'Paper', 'Scissors']", '', 'while True:', '    player = None', '    if button_a.is_pressed() and button_b.is_pressed():', '        player = 2', '    elif button_a.is_pressed():', '        player = 0', '    elif button_b.is_pressed():', '        player = 1', '    if player is not None:', '        machine = random.randint(0, 2)', '        display.scroll(opts[player])', '        if player == machine:', "            display.scroll('Tie!')", '        elif (player - machine) % 3 == 1:', "            display.scroll('WIN!')", '        else:', "            display.scroll('Lose...')", '    sleep(200)'])}
`;
</script>
</body>
</html>
