<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sensors — MicroPython in the Classroom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🌡️ Chapter 06</div>
      <h1>Sensors</h1>
      <p class="subtitle">Accelerometer, gestures, light and temperature sensors, and microphone (v2).</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap6');
document.getElementById('mc').innerHTML=`

  <h2>6.1 The accelerometer</h2>
  ${duaBox('rep',['<strong>Live demo:</strong> pass the micro:bit around while the simulator shows the values in real time.', "<strong>Science connection:</strong> Earth's gravity is 1g ≈ 1000 on the micro:bit scale."])}
  ${codeBlock('accel.py',['from microbit import *', '', 'while True:', '    x = accelerometer.get_x()', '    y = accelerometer.get_y()', '    z = accelerometer.get_z()', '    display.scroll(str(x))', '    sleep(500)'])}
  ${codeBlock('bubble.py',['from microbit import *', '', 'while True:', '    x = accelerometer.get_x()', '    y = accelerometer.get_y()', '    col  = min(4, max(0, 2 + x // 500))', '    row  = min(4, max(0, 2 + y // 500))', '    display.clear()', '    display.set_pixel(col, row, 9)', '    sleep(50)'])}
  <h2>6.2 Pre-defined gestures</h2>
  ${table(['Gesture', 'Movement'],[["'shake'", 'Shake'], ["'up'", 'Screen facing up'], ["'left'/'right'", 'Tilted'], ["'face up'", 'Flat face up'], ["'3g'/'6g'", 'Strong shake']])}
  <h3>✏️ Exercise 6.1 — Electronic dice ${level(1)} ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>When you shake the micro:bit, show a number from 1 to 6. The result stays until the next shake.</p>
  </div></div>
  <h2>6.3 Light and temperature sensors</h2>
  ${codeBlock('sensors.py',['from microbit import *', '', 'while True:', '    light = display.read_light_level()', '    temp  = temperature()', '    if light < 50:', '        display.show(Image.ASLEEP)', '    elif temp > 28:', '        display.show(Image.SURPRISED)', '    else:', '        display.show(Image.HAPPY)', '    sleep(1500)'])}
  ${warnBox(['The microphone is only available on micro:bit v2. On v1 it will give an error.'])}
`;
</script>
</body>
</html>
