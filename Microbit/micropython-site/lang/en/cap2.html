<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Variables & Data Types — MicroPython in the Classroom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">📦 Chapter 02</div>
      <h1>Variables & Data Types</h1>
      <p class="subtitle">Variables, basic types, mathematical operations and the temperature sensor.</p>
      <div class="header-badges"><span class="badge badge-green">${level(1)}</span><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap2');
document.getElementById('mc').innerHTML=`

  <h2>2.1 What is a variable?</h2>
  <p>A variable is like a <strong>labelled box</strong> where we store information.</p>
  ${conceptBox(["name = 'Ana'    → box 'name' containing 'Ana'", "age = 10        → box 'age' containing 10", 'temp = 36.5     → box with a decimal', 'on = True       → box: only True or False'])}
  ${duaBox('rep',['<strong>Physical metaphor:</strong> cardboard boxes in class with labels. Changing the value = changing the contents.', "<strong>Analogy for 6-9 year-olds:</strong> 'a variable is like your school locker: it has your name and you store whatever you want.'"])}
  <h2>2.2 Data types</h2>
  ${table(['Type', 'Example'],[['int', '0, 5, -3, 100'], ['float', '3.14, -0.5'], ['str', "'Hello', 'micro:bit'"], ['bool', 'True / False']])}
  ${codeBlock('variables.py',['from microbit import *', '', "name    = 'micro:bit'   # str: text", 'version = 2             # int: integer', 'voltage = 3.3           # float: decimal', 'active  = True          # bool: True/False', '', 'display.scroll(name)', 'sleep(500)', 'display.scroll(str(version))'])}
  ${warnBox(['To display a number on the LEDs, convert it with str().', 'display.scroll(5) gives an error. Correct: display.scroll(str(5)).'])}
  <h2>2.3 Operations</h2>
  ${codeBlock('ops.py',['from microbit import *', '', 'a = 10', 'b = 3', '', 'add  = a + b    # 13', 'sub  = a - b    # 7', 'mul  = a * b    # 30', 'div  = a / b    # 3.33...', 'idiv = a // b   # 3  (integer division)', 'mod  = a % b    # 1  (remainder)', 'pw   = a ** b   # 1000 (power)', '', "display.scroll('sum=' + str(add))"])}
  <h3>✏️ Exercise 2.1 — Calculator ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Define num1 and num2. Calculate sum, difference, product and quotient. Show each result with a prefix (+, -, x, /).</p>
  </div></div>
  ${duaBox('ace',["<strong>Template:</strong> num1 = ___ / num2 = ___ / add = ___ + ___ / display.scroll('+' + str(add))", '<strong>Extension:</strong> round the division to 1 decimal place with round(result, 1).'])}
  ${duaBox('imp',["<strong>Real context:</strong> use the student's own data: shoe size and age, today's and yesterday's temperature."])}
  <h2>2.4 Temperature sensor</h2>
  ${codeBlock('temp.py',['from microbit import *', '', 'while True:', '    temp = temperature()', "    display.scroll(str(temp) + 'C')", '    sleep(2000)'])}
  ${noteBox(['temperature() returns the chip temperature, 2-5 °C above ambient.', 'For ambient: temp = temperature() - 3'])}
`;
</script>
</body>
</html>
