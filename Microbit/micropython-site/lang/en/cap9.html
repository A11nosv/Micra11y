<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Complete Projects with UDL Adaptations — MicroPython in the Classroom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🚀 Chapter 09</div>
      <h1>Complete Projects with UDL Adaptations</h1>
      <p class="subtitle">Four projects with three UDL levels. The whole class works on the same project.</p>
      <div class="header-badges"><span class="badge badge-green">${level(1)}</span><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span><span class="badge badge-blue">${level(4)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap9');
document.getElementById('mc').innerHTML=`

  ${noteBox(['UDL principle: all students work on the SAME project, with different levels of support. This avoids stigmatisation.', 'The level is not fixed: a student can start at Level 1 and advance to Level 2 or 3 during the session.'])}
  <h2>Project 1 — My Emotional Robot ${level(1)}</h2>
  ${codeBlock('robot.py',['from microbit import *', '', 'display.show(Image.HAPPY)', '', 'while True:', "    if accelerometer.current_gesture() == 'shake':", '        display.show(Image.SURPRISED)', '        sleep(1000)', '        display.show(Image.HAPPY)', '    if button_a.is_pressed():', '        display.show(Image.SAD)', '        sleep(800)', '        display.show(Image.HAPPY)', '    if button_b.is_pressed():', '        display.show(Image.ASLEEP)', '        sleep(2000)', '        display.show(Image.HAPPY)', '    sleep(100)'])}
  ${duaBox('ace',['<strong>Level 1 — Template:</strong> code already written, student only changes images and timings.', '<strong>Level 2 — Standard:</strong> guided code from the example.', '<strong>Level 3 — Free extension:</strong> add sounds, temperature and custom emotions.'])}
  ${duaBox('imp',["<strong>Intrinsic motivation:</strong> the robot has the name and personality the student chose. It's not 'the exercise robot', it's 'their robot'."])}
  <h2>Project 2 — Pedometer ${level(2)}</h2>
  ${codeBlock('pedo.py',['from microbit import *', '', 'steps  = 0', 'last_z = accelerometer.get_z()', 'thresh = 400', '', 'while True:', '    z    = accelerometer.get_z()', '    diff = abs(z - last_z)', '    if diff > thresh:', '        steps += 1', '        display.show(str(steps % 10))', '    last_z = z', '    if button_a.was_pressed():', '        display.scroll(str(steps))', '    if button_b.was_pressed():', '        steps = 0', '    sleep(50)'])}
  ${duaBox('imp',['<strong>Outside the classroom:</strong> take the session to the playground. Students test the pedometer by walking, running, climbing stairs and compare results.'])}
  <h2>Project 3 — Weather Station ${level(3)}</h2>
  ${codeBlock('weather.py',['from microbit import *', '', 'readings = []', '', 'def cal_temp():', '    return temperature() - 3', '', 'def mean(lst):', '    return sum(lst)/len(lst) if lst else 0', '', 'def record():', '    t = cal_temp()', '    readings.append(t)', '    if len(readings) > 10:', '        readings.pop(0)', '    return t', '', 'while True:', '    t = record()', "    display.scroll(str(t) + 'C', delay=70)", '    if button_a.was_pressed():', '        display.scroll(str(round(mean(readings),1)))', '    sleep(5000)'])}
  <h2>Project 4 — Access Control System ${level(4)}</h2>
  ${codeBlock('lock.py',['from microbit import *', 'import radio', '', 'radio.on()', 'radio.config(group=42)', '', "PASSWORD = '2024micro'", 'attempts = 0', 'locked   = False', '', 'def open_door():', '    display.show(Image.YES)', '    sleep(2000)', '    display.clear()', '', 'def lock_out():', '    global locked', '    locked = True', "    display.scroll('LOCKED')", '', 'while True:', '    msg = radio.receive()', '    if msg and not locked:', '        if msg == PASSWORD:', '            attempts = 0', '            open_door()', '        else:', '            attempts += 1', '            if attempts >= 3:', '                lock_out()', '    sleep(100)'])}
  ${duaBox('imp',['<strong>Ethics debate:</strong> what data should an access system store? For how long? Who can see it? Connect with GDPR.', '<strong>Real-world comparison:</strong> metro card, fingerprint, facial recognition. Which is more secure? Which better respects privacy?'])}
`;
</script>
</body>
</html>
