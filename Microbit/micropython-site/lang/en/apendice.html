<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MicroPython Quick Reference — MicroPython in the Classroom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">📋 Appendix</div>
      <h1>MicroPython Quick Reference</h1>
      <p class="subtitle">Key functions, common errors and UDL glossary to keep handy in class.</p>
      <div class="header-badges"><span class="badge badge-blue">📋</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('apendice');
document.getElementById('mc').innerHTML=`

  <h2>A.1 LED Display</h2>
  ${codeBlock('ref_screen.py',['from microbit import *', 'display.show(Image.HAPPY)         # Show image', "display.scroll('text')            # Scroll text", 'display.clear()                   # Turn off all LEDs', 'display.set_pixel(x, y, b)        # Set pixel (b = 0-9)', 'display.read_light_level()        # Light sensor (0-255)'])}
  <h2>A.2 Buttons & Sensors</h2>
  ${codeBlock('ref_input.py',['button_a.is_pressed()   # True if pressed now', 'button_a.was_pressed()  # True since last check', 'accelerometer.get_x()  # X axis (-2000 to +2000)', 'accelerometer.current_gesture()  # shake/up/down/left/right', 'temperature()           # Chip temperature in Celsius'])}
  <h2>A.3 Time & Random</h2>
  ${codeBlock('ref_time.py',['sleep(ms)              # Pause (1000 = 1 second)', 'import random', 'random.randint(a, b)   # Random integer [a, b]', 'random.choice(lst)     # Random element from list'])}
  <h2>A.4 Music</h2>
  ${codeBlock('ref_music.py',['import music', 'music.play(music.BIRTHDAY)', "music.play(['C4:4', 'D4:4'])   # Note list", 'music.pitch(freq, dur)         # Hz, milliseconds', '# Notes: C D E F G A B'])}
  <h2>A.5 Radio</h2>
  ${codeBlock('ref_radio.py',['import radio', 'radio.on()             # Always first!', 'radio.config(group=N)  # Channel 1-255', "radio.send('msg')      # Send text", 'radio.receive()        # Receive text (None if empty)'])}
  <h2>A.6 Common errors</h2>
  ${table(['Error', 'Cause', 'Solution'],[['SyntaxError', "Missing ':' or unclosed quotes.", 'Check the indicated line.'], ['IndentationError', 'Mix of spaces and tabs.', 'Re-indent with 4 spaces.'], ['TypeError', 'Concatenating a number and text directly.', "str(number) + 'text'"], ['NameError', 'Variable used before being defined.', "Define the variable with '=' first."]])}
  <h2>A.7 UDL Glossary</h2>
  ${table(['Term', 'Definition', 'Metaphor'],[['variable', 'Space to store a value.', 'Labelled box.'], ['if / else', 'Runs code based on condition.', 'Traffic light.'], ['while / for', 'Repeats a block of code.', 'Washing machine.'], ['def', 'Defines reusable function.', 'Named recipe.'], ['sleep()', 'Pauses execution.', 'The program takes a nap.'], ['True / False', 'Only two boolean values.', 'On/off switch.']])}
  <div style="text-align:center;margin-top:48px;padding-top:24px;border-top:2px solid var(--paper2)">
    <p style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--blue);font-style:italic;margin-bottom:8px">
      Good luck coding with your students!
    </p>
    <p style="color:var(--ink2);font-style:italic">
      Designing for diversity is not designing for a few. It is designing better for everyone.
    </p>
  </div>
`;
</script>
</body>
</html>
