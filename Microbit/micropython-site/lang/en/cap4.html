<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loops — MicroPython in the Classroom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🔄 Chapter 04</div>
      <h1>Loops</h1>
      <p class="subtitle">while and for loops, LED animations and pixel patterns.</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap4');
document.getElementById('mc').innerHTML=`

  <h2>4.1 The while loop</h2>
  ${duaBox('rep',['<strong>Physical activity:</strong> 5 students in a row say their name WHILE there are still people in front of them. They have acted out a while loop.', '<strong>Analogy:</strong> a loop is like a washing machine drum: it spins until it is done.'])}
  ${codeBlock('while_loop.py',['from microbit import *', '', 'n = 5', 'while n > 0:', '    display.show(str(n))', '    sleep(800)', '    n -= 1   # n = n - 1', '', 'display.show(Image.HAPPY)'])}
  ${conceptBox(['The while loop repeats while the condition is True.', 'n -= 1 is shorthand for n = n - 1.'])}
  <h2>4.2 The for loop</h2>
  ${codeBlock('for_loop.py',['from microbit import *', '', '# range(5) → 0,1,2,3,4', 'for i in range(5):', '    display.show(str(i))', '    sleep(500)', '', '# range(1,6) → 1,2,3,4,5', 'for i in range(1, 6):', '    display.show(str(i))', '    sleep(400)'])}
  ${noteBox(['range(n) generates 0, 1, 2, ..., n-1.', 'range(start, stop, step) allows counting by 2s, 3s, or backwards.'])}
  <h2>4.3 Nested loops — Animation</h2>
  ${codeBlock('nested.py',['from microbit import *', '', 'for y in range(5):', '    for x in range(5):', '        display.set_pixel(x, y, 9)', '        sleep(50)', 'sleep(500)', 'display.clear()'])}
  <h3>✏️ Exercise 4.1 — Digital counter ${level(1)} ${level(2)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Count 0, 1, 2... up to 9 and restart. Each number 0.5 s. Extension: button A pauses.</p>
  </div></div>
  ${duaBox('ace',['<strong>Level 1 — Template:</strong> for i in range(___): display.show(str(___)) sleep(___)', '<strong>Level 3 — Advanced:</strong> count down 9→0 with range(9, -1, -1).'])}
  ${duaBox('imp',['<strong>Context choice:</strong> the student can program a match timer, exercise rep counter...'])}
  <h3>✏️ Exercise 4.2 — Pixels and patterns ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>With display.set_pixel(x, y, brightness) and nested loops: 1. Draw the border (5×5 perimeter). 2. Draw an X (two diagonals). 3. Chessboard: on if (x+y)%2==0.</p>
  </div></div>
`;
</script>
</body>
</html>
