<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sound & Music — MicroPython in the Classroom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">&#9776;</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🎵 Chapter 07</div>
      <h1>Sound & Music</h1>
      <p class="subtitle">Pre-defined melodies, composition with notes and frequencies in Hz.</p>
      <div class="header-badges"><span class="badge badge-amber">${level(2)}</span><span class="badge badge-coral">${level(3)}</span></div>
    </div>
    <div class="content" id="mc"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap7');
document.getElementById('mc').innerHTML=`

  ${duaBox('rep',['<strong>Hearing accessibility:</strong> for students with hearing difficulties, replace music.play() with display.show(). The chapter is fully accessible in visual-only mode.', 'Students with auditory sensitivity can work with headphones or with the volume low.'])}
  <h2>7.1 Pre-defined melodies</h2>
  ${codeBlock('melodies.py',['from microbit import *', 'import music', '', 'music.play(music.BIRTHDAY)', 'sleep(500)', 'music.play(music.POWER_UP)', 'sleep(500)'])}
  ${table(['Melody', 'Description'],[['music.BIRTHDAY', 'Happy Birthday'], ['music.POWER_UP', 'Start/Victory'], ['music.POWER_DOWN', 'Defeat'], ['music.FUNERAL', 'Funeral march'], ['music.BA_DING', 'Notification']])}
  <h2>7.2 Composition with notes</h2>
  ${codeBlock('scale.py',['from microbit import *', 'import music', '', "# Format: 'NOTE OCTAVE : DURATION'", '# Notes: C D E F G A B', '# Duration: 4=quarter 8=eighth 2=half 1=whole', '', "scale = ['C4:4','D4:4','E4:4','F4:4',", "         'G4:4','A4:4','B4:4','C5:4']", 'music.play(scale)'])}
  ${noteBox(['Scale in Hz: C=262, D=294, E=330, F=349, G=392, A=440, B=494.', 'Doubling the frequency = going up one octave.'])}
  <h3>✏️ Exercise 7.1 — Composer ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise"><span class="box-icon">✏️</span><div class="box-body">
    <p>Compose your own melody with at least 8 notes and 2 different durations. Give it a name and document it with comments.</p>
  </div></div>
  ${duaBox('ace',['<strong>Visual option:</strong> write the notes on a stave or table (C-D-E...) and then transcribe to code.', '<strong>Oral option:</strong> hum the melody while the micro:bit plays it.', '<strong>Free option:</strong> transcribe an existing melody you already know into code.'])}
  ${duaBox('imp',['<strong>Total freedom:</strong> the student chooses which melody to compose. No style restrictions. Rap, classical, pop, original...'])}
`;
</script>
</body>
</html>
