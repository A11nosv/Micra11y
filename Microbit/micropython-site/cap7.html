<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cap. 7: Sonido y Música — MicroPython en el Aula</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button class="menu-btn" id="menu-btn">☰</button>
<div class="overlay" id="overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div class="chapter-tag">🎵 Capítulo 07</div>
      <h1>Sonido y Música</h1>
      <p class="subtitle">Melodías predefinidas, composición con notas musicales en formato texto y sonidos con frecuencias en Hz.</p>
      <div class="header-badges">
        <span class="badge badge-amber">🟡 Básico</span>
        <span class="badge badge-coral">🟠 Intermedio</span>
      </div>
    </div>
    <div class="content" id="main-content"></div>
    <div id="page-nav"></div>
  </main>
</div>
<script src="nav.js"></script>
<script>
initPage('cap7');
document.getElementById('main-content').innerHTML = `
  ${duaBox('rep', [
    '<strong>Accesibilidad auditiva:</strong> para alumnos con hipoacusia o sordera, todos los ejercicios pueden completarse reemplazando music.play() por display.show() o display.scroll(). La nota se muestra como texto ("Do", "Re"...) o como número de frecuencia.',
    'Los alumnos con sensibilidad auditiva pueden trabajar con auriculares o con el volumen bajo.',
    'El capítulo es completamente accesible en modo solo visual.',
  ])}

  <h2>7.1 Melodías predefinidas</h2>
  ${codeBlock('melodias.py', [
    'from microbit import *',
    'import music',
    '',
    'music.play(music.BIRTHDAY)    # Cumpleaños feliz',
    'sleep(500)',
    'music.play(music.POWER_UP)    # Sonido de inicio',
    'sleep(500)',
    'music.play(music.FUNERAL)     # Marcha fúnebre',
  ])}

  ${table(
    ['Melodía', 'Descripción'],
    [
      ['music.BIRTHDAY', 'Cumpleaños feliz'],
      ['music.WEDDING', 'Marcha nupcial'],
      ['music.FUNERAL', 'Marcha fúnebre'],
      ['music.POWER_UP', 'Sonido de inicio / victoria'],
      ['music.POWER_DOWN', 'Sonido de apagado / derrota'],
      ['music.JUMP_UP / JUMP_DOWN', 'Efectos de salto'],
      ['music.BA_DING', 'Notificación corta'],
    ]
  )}

  <h2>7.2 Composición con notas</h2>
  ${codeBlock('escala.py', [
    'from microbit import *',
    'import music',
    '',
    "# Formato de nota: 'NOTA OCTAVA : DURACION'",
    '# Notas: C D E F G A B = Do Re Mi Fa Sol La Si',
    '# Duración: 4=negra  8=corchea  2=blanca  1=redonda',
    '',
    "escala = ['C4:4','D4:4','E4:4','F4:4','G4:4','A4:4','B4:4','C5:4']",
    'music.play(escala)',
  ])}

  <h3>✏️ Ejercicio 7.1 — Compositor ${level(2)} ${level(3)}</h3>
  <div class="box box-exercise">
    <span class="box-icon">✏️</span>
    <div class="box-body">
      <p>Compón una melodía propia de al menos <strong>8 notas</strong>.</p>
      <p>Usa al menos 2 duraciones diferentes (4 y 8).</p>
      <p>Dale un nombre y documenta con comentarios qué parte es estrofa y cuál es estribillo.</p>
    </div>
  </div>

  ${duaBox('ace', [
    '<strong>Opción sonora:</strong> componer directamente en código.',
    '<strong>Opción visual:</strong> escribir las notas en un pentagrama o tabla (Do-Re-Mi...) y luego transferir al código.',
    '<strong>Opción corporal:</strong> tocar la melodía con body percussion y luego transcribirla.',
    '<strong>Opción investigación:</strong> transcribir al código una melodía existente que ya conoces.',
  ])}
  ${duaBox('imp', [
    '<strong>Elección total:</strong> el alumno elige qué melodía compone. Sin restricciones de estilo. Rap, clásica, pop, inventada...',
    '<strong>Colaboración interdisciplinar:</strong> coordina con el/la profesor/a de Música para que el ejercicio cuente también como actividad de esa asignatura.',
  ])}

  <h2>7.3 Frecuencias y pitidos</h2>
  ${codeBlock('frecuencias.py', [
    'from microbit import *',
    'import music',
    '',
    '# music.pitch(frecuencia_Hz, duracion_ms)',
    'music.pitch(440, 500)     # La4 durante 0,5 segundos',
    'sleep(200)',
    'music.pitch(880, 500)     # La5 (el doble = octava superior)',
    '',
    '# Sirena de emergencia',
    'for i in range(5):',
    '    music.pitch(800, 200)',
    '    music.pitch(600, 200)',
  ])}

  ${noteBox([
    'Escala musical en Hz: Do=262, Re=294, Mi=330, Fa=349, Sol=392, La=440, Si=494.',
    'Duplicar la frecuencia equivale a subir una octava.',
    'music.pitch() requiere altavoz (integrado en v2, o externo en pins 0 y GND para v1).',
  ])}
`;
</script>
</body>
</html>
